<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guerreiras do Brasil | Portal da Seleção Feminina</title>
    <style>
        /* Variáveis de Cores */
        :root {
            --verde-brasil: #009c3b;
            --amarelo-brasil: #ffdf00;
            --azul-brasil: #002776;
            --cinza-fundo: #f8f9fa;
            --texto-escuro: #212529;
            --branco: #ffffff;
        }

        /* Reset Geral */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--cinza-fundo);
            color: var(--texto-escuro);
            line-height: 1.6;
        }

        /* Cabeçalho e Navegação */
        header {
            background: linear-gradient(135deg, var(--verde-brasil) 60%, var(--azul-brasil));
            color: var(--branco);
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--amarelo-brasil);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        header p {
            font-size: 1.2rem;
            margin-top: 0.5rem;
            font-weight: 300;
        }

        nav {
            background-color: var(--azul-brasil);
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0.8rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--branco);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        nav a:hover {
            background-color: var(--verde-brasil);
            color: var(--amarelo-brasil);
        }

        /* Container Principal */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* Seção Principal de Conteúdo */
        section {
            background: var(--branco);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }

        h2 {
            color: var(--azul-brasil);
            border-left: 5px solid var(--verde-brasil);
            padding-left: 10px;
            margin-bottom: 1rem;
            font-size: 1.6rem;
        }

        p {
            margin-bottom: 1rem;
            color: #4a5568;
            text-align: justify;
        }

        /* Tabela de Títulos */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #edf2f7;
            color: var(--azul-brasil);
            font-weight: 600;
        }

        tr:hover {
            background-color: #f7fafc;
        }

        /* Barra Lateral (Sidebar) */
        aside {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .widget {
            background: var(--branco);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .widget h3 {
            color: var(--verde-brasil);
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
        }
